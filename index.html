<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐课堂点名系统</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome -->
    <link href="vendor/font-awesome/css/font-awesome.min.css" rel="stylesheet">

    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#8A2BE2', // 主紫色
                        secondary: '#DDA0DD', // 淡紫色
                        accent: '#FF69B4', // 亮粉色作为强调色
                        success: '#32CD32', // 成功绿色
                        effort: '#FFA500', // 努力橙色
                    },
                    fontFamily: {
                        fun: ['"Comic Sans MS"', '"Marker Felt"', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- 自定义工具类 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .animate-float {
                animation: float 3s ease-in-out infinite;
            }
            .animate-pulse-slow {
                animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            }
            .animate-sparkle {
                animation: sparkle 2s linear infinite;
            }
            .bg-rainbow {
                background: linear-gradient(90deg, #ff0000, #ffa500, #ffff00, #008000, #0000ff, #4b0082, #ee82ee);
                background-size: 1400% 1400%;
                animation: rainbow 15s ease infinite;
            }
            .text-rainbow {
                background: linear-gradient(90deg, #ff0000, #ffa500, #ffff00, #008000, #0000ff, #4b0082, #ee82ee);
                background-size: 1400% 1400%;
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                animation: rainbow 15s ease infinite;
            }
        }
        
        /* 动画定义 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px) rotate(-5deg); }
            40% { transform: translateX(10px) rotate(5deg); }
            60% { transform: translateX(-10px) rotate(-3deg); }
            80% { transform: translateX(10px) rotate(3deg); }
        }
        
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes float-up {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
        
        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(138, 43, 226, 0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(138, 43, 226, 0.8);
        }
    </style>
</head>

<body
    class="min-h-screen transition-colors duration-300 bg-gradient-to-br from-purple-100 to-purple-300 dark:from-gray-900 dark:to-purple-900 font-fun">
    <!-- 装饰星星 -->
    <div id="stars-container" class="fixed inset-0 pointer-events-none overflow-hidden z-0"></div>

    <!-- 装饰气泡 -->
    <div id="bubbles-container" class="fixed inset-0 pointer-events-none overflow-hidden z-0"></div>

    <!-- 顶部导航栏 -->
    <header class="relative z-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md shadow-md py-4 px-6 rounded-b-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl md:text-3xl font-bold text-rainbow flex items-center">
                <i class="fa fa-bullseye mr-2 animate-pulse-slow"></i>
                快乐课堂点名系统
                <i class="fa fa-graduation-cap ml-2 animate-float"></i>
            </h1>
            <div class="flex items-center space-x-4">
                <button id="settings-btn"
                    class="p-2 rounded-full hover:bg-purple-200 dark:hover:bg-purple-800 transition-all duration-300 transform hover:scale-110">
                    <i class="fa fa-cog text-purple-700 dark:text-purple-300 text-xl"></i>
                </button>
                <button id="theme-toggle"
                    class="p-2 rounded-full hover:bg-purple-200 dark:hover:bg-purple-800 transition-all duration-300 transform hover:scale-110">
                    <i class="fa fa-sun-o text-purple-700 dark:text-purple-300 text-xl dark:hidden"></i>
                    <i class="fa fa-moon-o text-purple-700 dark:text-purple-300 text-xl hidden dark:block"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主要内容区 -->
    <main class="container mx-auto px-4 py-8 relative z-10">
        <!-- 提示消息 -->
        <div id="toast"
            class="fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-50 opacity-0 transition-all duration-300 pointer-events-none flex items-center">
            <i id="toast-icon" class="mr-2"></i>
            <span id="toast-message"></span>
        </div>

        <!-- 上传区域 -->
        <section
            class="mb-12 bg-white/70 dark:bg-gray-800/70 backdrop-blur-md rounded-2xl shadow-lg p-6 transition-all duration-300 hover:shadow-xl">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-4">
                <h2 class="text-xl md:text-2xl font-bold text-purple-800 dark:text-purple-200 flex items-center">
                    <i class="fa fa-file-excel-o mr-2 animate-float"></i>
                    导入学生名单
                </h2>
                <div class="flex items-center gap-2 shrink-0">
                    <label for="class-select"
                        class="text-sm font-medium text-purple-700 dark:text-purple-300 whitespace-nowrap">
                        <i class="fa fa-users mr-1"></i>默认班级
                    </label>
                    <select id="class-select"
                        class="min-w-[11rem] md:min-w-[13rem] px-3 py-2 border border-purple-300 dark:border-purple-700 rounded-lg bg-white dark:bg-gray-700 text-purple-800 dark:text-purple-100 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <!-- 选项由脚本根据 defaultClassRosters 填充 -->
                    </select>
                </div>
            </div>

            <div id="upload-area"
                class="border-2 border-dashed border-purple-400 dark:border-purple-600 rounded-xl p-8 text-center transition-all duration-300 hover:border-purple-600 dark:hover:border-purple-400 cursor-pointer">
                <i class="fa fa-folder-open text-5xl text-purple-500 dark:text-purple-400 mb-4 animate-float"></i>
                <p class="text-purple-800 dark:text-purple-200 mb-2">拖放Excel文件到这里，或点击选择文件</p>
                <p class="text-sm text-purple-600 dark:text-purple-400">支持.xlsx格式文件</p>
                <input type="file" id="file-input" accept=".xlsx" class="hidden">
            </div>

            <!-- 已上传文件信息 -->
            <div id="file-info" class="mt-4 hidden">
                <div class="flex items-center justify-between bg-purple-50 dark:bg-purple-900/30 p-3 rounded-lg">
                    <div class="flex items-center">
                        <i class="fa fa-file-text-o text-purple-600 dark:text-purple-300 mr-2"></i>
                        <span id="file-name" class="text-purple-800 dark:text-purple-200 truncate max-w-md"></span>
                    </div>
                    <button id="remove-file"
                        class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300 transition-colors duration-300">
                        <i class="fa fa-times-circle"></i>
                    </button>
                </div>

                <!-- 列选择 -->
                <div id="column-selection" class="mt-4 hidden">
                    <label class="block text-purple-800 dark:text-purple-200 mb-2">请选择包含学生姓名的列：</label>
                    <select id="column-select"
                        class="w-full p-2 border border-purple-300 dark:border-purple-700 rounded-lg bg-white dark:bg-gray-700 text-purple-800 dark:text-purple-100 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <!-- 选项将通过JavaScript动态添加 -->
                    </select>
                    <button id="confirm-column"
                        class="mt-3 bg-purple-600 hover:bg-purple-700 text-white py-2 px-4 rounded-lg transition-all duration-300 transform hover:scale-105">
                        确认导入
                    </button>
                </div>
            </div>

            <!-- 学生名单预览 -->
            <div id="students-preview" class="mt-6 hidden">
                <h3 class="text-lg font-semibold text-purple-800 dark:text-purple-200 mb-2">
                    学生名单预览 <span id="students-count" class="text-sm font-normal"></span>
                </h3>
                <p class="text-xs text-purple-600 dark:text-purple-400 mb-2">
                    点击姓名旁的 <i class="fa fa-times"></i> 可从名单中移除（点名滚动进行中不可删减）
                </p>
                <div
                    class="max-h-40 overflow-y-auto bg-white/50 dark:bg-gray-800/50 p-3 rounded-lg border border-purple-200 dark:border-purple-700">
                    <div id="students-list" class="flex flex-wrap gap-2">
                        <!-- 学生姓名将通过JavaScript动态添加 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- 点名区域 -->
        <section
            class="mb-12 bg-white/70 dark:bg-gray-800/70 backdrop-blur-md rounded-2xl shadow-lg p-6 transition-all duration-300 hover:shadow-xl">
            <h2 class="text-xl md:text-2xl font-bold mb-6 text-purple-800 dark:text-purple-200 flex items-center">
                <i class="fa fa-random mr-2 animate-float"></i>
                随机点名
            </h2>

            <div id="name-display"
                class="flex flex-col items-center justify-center min-h-64 md:min-h-80 bg-gradient-to-br from-purple-50 to-indigo-50 dark:from-gray-900 dark:to-purple-950 rounded-xl border-4 border-dashed border-purple-300 dark:border-purple-700 mb-6 overflow-hidden relative">
                <div class="text-center p-6">
                    <p id="display-text"
                        class="text-2xl md:text-4xl lg:text-5xl font-bold text-purple-700 dark:text-purple-300 transition-all duration-300">
                        请先导入学生名单
                    </p>
                    <p class="text-purple-500 dark:text-purple-400 mt-2">点击下方按钮开始随机点名</p>
                </div>

                <!-- 闪光效果 -->
                <div id="shine-effect"
                    class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent transform rotate-45 translate-x-[-100%] opacity-0 transition-all duration-500">
                </div>
            </div>

            <div class="flex justify-center gap-4">
                <button id="start-btn"
                    class="bg-purple-600 hover:bg-purple-700 text-white py-3 px-8 rounded-full text-lg font-bold transition-all duration-300 transform hover:scale-110 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center">
                    <i class="fa fa-play mr-2"></i> 开始
                </button>
                <button id="stop-btn"
                    class="bg-accent hover:bg-pink-600 text-white py-3 px-8 rounded-full text-lg font-bold transition-all duration-300 transform hover:scale-110 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center"
                    disabled>
                    <i class="fa fa-stop mr-2"></i> 停止
                </button>
            </div>

            <!-- 结果反馈按钮 -->
            <div id="feedback-buttons" class="flex justify-center gap-4 mt-6 hidden">
                <button id="correct-btn"
                    class="bg-success hover:bg-green-600 text-white py-2 px-6 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center">
                    <i class="fa fa-check mr-2"></i> 回答正确
                </button>
                <button id="effort-btn"
                    class="bg-effort hover:bg-orange-600 text-white py-2 px-6 rounded-lg transition-all duration-300 transform hover:scale-105 flex items-center">
                    <i class="fa fa-heart mr-2"></i> 需要努力
                </button>
            </div>
        </section>

        <!-- 历史记录区域 -->
        <section
            class="mb-12 bg-white/70 dark:bg-gray-800/70 backdrop-blur-md rounded-2xl shadow-lg p-6 transition-all duration-300 hover:shadow-xl">
            <h2 class="text-xl md:text-2xl font-bold mb-4 text-purple-800 dark:text-purple-200 flex items-center">
                <i class="fa fa-trophy mr-2 animate-float"></i>
                今日英雄榜
            </h2>

            <div id="history-list" class="space-y-3 max-h-80 overflow-y-auto p-2">
                <!-- 历史记录将通过JavaScript动态添加 -->
                <div class="text-center text-purple-500 dark:text-purple-400 py-8">
                    <i class="fa fa-star-o text-4xl mb-2 block animate-float"></i>
                    还没有点名记录哦
                </div>
            </div>
        </section>
    </main>

    <!-- 结果弹窗 -->
    <div id="result-modal"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="modal-content"
            class="bg-white dark:bg-gray-800 rounded-2xl p-8 max-w-md w-full mx-4 transform scale-90 transition-transform duration-300">
            <div class="text-center">
                <div id="modal-icon" class="text-6xl mb-4"></div>
                <h3 id="modal-title" class="text-2xl font-bold mb-2 text-purple-800 dark:text-purple-200"></h3>
                <p id="modal-message" class="text-lg text-purple-600 dark:text-purple-300 mb-6"></p>
                <button id="close-modal"
                    class="bg-purple-600 hover:bg-purple-700 text-white py-2 px-6 rounded-lg transition-all duration-300 transform hover:scale-105">
                    确定
                </button>
            </div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-modal"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="settings-content"
            class="bg-white dark:bg-gray-800 rounded-2xl p-6 max-w-lg w-full mx-4 transform scale-90 transition-transform duration-300 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold text-purple-800 dark:text-purple-200">
                    <i class="fa fa-cog mr-2"></i> 个性化设置
                </h3>
                <button id="close-settings"
                    class="text-purple-500 hover:text-purple-700 dark:text-purple-400 dark:hover:text-purple-300">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>

            <!-- 表扬语设置 -->
            <div class="mb-6">
                <h4 class="text-lg font-semibold text-purple-700 dark:text-purple-300 mb-3">
                    表扬语录（回答正确时显示）
                </h4>
                <textarea id="praise-phrases"
                    class="w-full p-3 border border-purple-300 dark:border-purple-700 rounded-lg bg-white dark:bg-gray-700 text-purple-800 dark:text-purple-100 focus:outline-none focus:ring-2 focus:ring-purple-500 min-h-[120px]"
                    placeholder="每行输入一条表扬语..."></textarea>
                <p class="text-xs text-purple-500 dark:text-purple-400 mt-1">每行一条，随机显示</p>
            </div>

            <!-- 鼓励语设置 -->
            <div class="mb-6">
                <h4 class="text-lg font-semibold text-purple-700 dark:text-purple-300 mb-3">
                    鼓励语录（需要努力时显示）
                </h4>
                <textarea id="encourage-phrases"
                    class="w-full p-3 border border-purple-300 dark:border-purple-700 rounded-lg bg-white dark:bg-gray-700 text-purple-800 dark:text-purple-100 focus:outline-none focus:ring-2 focus:ring-purple-500 min-h-[120px]"
                    placeholder="每行输入一条鼓励语..."></textarea>
                <p class="text-xs text-purple-500 dark:text-purple-400 mt-1">每行一条，随机显示</p>
            </div>

            <button id="save-settings"
                class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 px-6 rounded-lg transition-all duration-300 transform hover:scale-[1.02] font-bold">
                保存设置
            </button>
        </div>
    </div>

    <!-- 动画容器 -->
    <div id="animation-container" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

    <!-- 底部信息栏 -->
    <footer class="relative z-10 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md py-4 px-6 rounded-t-2xl">
        <div class="container mx-auto text-center text-purple-600 dark:text-purple-400 text-sm">
            <p>快乐课堂点名系统 &copy; 2026 | 让每一次点名都充满乐趣 🎉</p>
        </div>
    </footer>

    <script>
        // 全局变量
        let students = [];
        let availableStudents = [];
        let isRolling = false;
        let rollInterval;
        let currentName = '';
        let historyRecords = [];

        // 默认表扬语和鼓励语
        const defaultPraisePhrases = [
            "你真是个小天才！",
            "太棒了，继续加油！",
            "太厉害了，为你点赞！",
            "真聪明，一点就通！",
            "太精彩了，老师为你骄傲！",
            "你的回答太完美了！",
            "哇，你真的很用心！",
            "真不错，继续保持！"
        ];

        const defaultEncouragePhrases = [
            "没关系，下次一定可以的！",
            "别灰心，继续努力！",
            "加油，老师相信你！",
            "再试一次，你能做到的！",
            "不要放弃，你已经很接近了！",
            "每一次尝试都是进步！",
            "继续努力，你会越来越棒的！",
            "失败是成功之母，继续加油！"
        ];

        /** 各班级默认名单（可按需增删班级与姓名） */
        const defaultClassRosters = {
            '24级电子商务': ['张天宇', '陶宇博', '章子菡', '卫振东', '徐子涵', '刘鑫', '叶馨月', '高冉冉', '倪澳', '刘俊', '陆芳婧', '武继康', '刘释骏', '姜硕硕', '樊佳丽', '斯洋宝儿', '叶馨冉', '舒允希', '孟馨', '倪士康子', '苏徐云', '王雨欣', '夏屹辰', '谢少文', '叶明珠', '张可', '尹丁可'],
            '25级电子商务': ['刘包妍', '汪宇佳', '李雨露', '陈淑雅', '梁靖雅', '钱有为', '储文俊', '许靖', '付欣颜', '王文韬', '梁锦波', '周家豪', '赵雯婷', '郑萌萌', '温佳丽', '李雅茹'],
        };

        // DOM元素
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const removeFile = document.getElementById('remove-file');
        const columnSelection = document.getElementById('column-selection');
        const columnSelect = document.getElementById('column-select');
        const confirmColumn = document.getElementById('confirm-column');
        const studentsPreview = document.getElementById('students-preview');
        const studentsList = document.getElementById('students-list');
        const studentsCount = document.getElementById('students-count');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const displayText = document.getElementById('display-text');
        const feedbackButtons = document.getElementById('feedback-buttons');
        const correctBtn = document.getElementById('correct-btn');
        const effortBtn = document.getElementById('effort-btn');
        const historyList = document.getElementById('history-list');
        const resultModal = document.getElementById('result-modal');
        const modalContent = document.getElementById('modal-content');
        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalMessage = document.getElementById('modal-message');
        const closeModal = document.getElementById('close-modal');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const settingsContent = document.getElementById('settings-content');
        const closeSettings = document.getElementById('close-settings');
        const praisePhrases = document.getElementById('praise-phrases');
        const encouragePhrases = document.getElementById('encourage-phrases');
        const saveSettings = document.getElementById('save-settings');
        const themeToggle = document.getElementById('theme-toggle');
        const toast = document.getElementById('toast');
        const toastIcon = document.getElementById('toast-icon');
        const toastMessage = document.getElementById('toast-message');
        const shineEffect = document.getElementById('shine-effect');
        const animationContainer = document.getElementById('animation-container');
        const classSelect = document.getElementById('class-select');

        function populateClassSelect() {
            classSelect.innerHTML = '';
            const placeholder = document.createElement('option');
            placeholder.value = '';
            placeholder.textContent = '请选择班级（默认名单）';
            classSelect.appendChild(placeholder);
            Object.keys(defaultClassRosters).sort().forEach((name) => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                classSelect.appendChild(opt);
            });
        }

        /** 将一组单元格解析为学生姓名并更新界面；成功返回 true */
        function applyStudentNames(rawList) {
            students = [];
            for (const cell of rawList) {
                if (cell === undefined || cell === null || cell === '') continue;
                const s = String(cell).trim();
                if (s !== '') students.push(s);
            }
            availableStudents = [...students];
            if (students.length === 0) {
                showToast('未找到有效的学生姓名', 'error');
                startBtn.disabled = true;
                studentsPreview.classList.add('hidden');
                displayText.textContent = '请先导入学生名单';
                return false;
            }
            displayStudentPreview();
            startBtn.disabled = false;
            displayText.textContent = '点击开始按钮进行点名';
            return true;
        }

        function clearExcelImportUI() {
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            columnSelection.classList.add('hidden');
        }

        let xlsxLoadPromise = null;
        function ensureXlsxLoaded() {
            if (typeof XLSX !== 'undefined') return Promise.resolve();
            if (xlsxLoadPromise) return xlsxLoadPromise;
            xlsxLoadPromise = new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = 'vendor/xlsx.full.min.js';
                s.async = true;
                s.onload = () => resolve();
                s.onerror = () => {
                    xlsxLoadPromise = null;
                    reject(new Error('Failed to load SheetJS'));
                };
                document.head.appendChild(s);
            });
            return xlsxLoadPromise;
        }

        // 初始化
        function init() {
            populateClassSelect();
            // 加载本地存储的设置
            loadSettings();

            // 检查暗黑模式偏好
            if (localStorage.getItem('darkMode') === 'true' ||
                (!localStorage.getItem('darkMode') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }

            // 创建装饰星星和气泡
            createStars(30);
            createBubbles(15);
        }

        // 创建装饰星星
        function createStars(count) {
            const starsContainer = document.getElementById('stars-container');

            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 10 + 3;
                const opacity = Math.random() * 0.8 + 0.2;
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const delay = Math.random() * 5;

                star.className = 'absolute text-yellow-200 dark:text-yellow-300 animate-pulse-slow';
                star.innerHTML = '★';
                star.style.cssText = `
                    left: ${left}%;
                    top: ${top}%;
                    font-size: ${size}px;
                    opacity: ${opacity};
                    animation-delay: ${delay}s;
                    transform: rotate(${Math.random() * 360}deg);
                `;

                starsContainer.appendChild(star);
            }
        }

        // 创建装饰气泡
        function createBubbles(count) {
            const bubblesContainer = document.getElementById('bubbles-container');

            for (let i = 0; i < count; i++) {
                const bubble = document.createElement('div');
                const size = Math.random() * 60 + 20;
                const opacity = Math.random() * 0.3 + 0.1;
                const left = Math.random() * 100;
                const duration = Math.random() * 30 + 20;
                const delay = Math.random() * 10;

                bubble.className = 'absolute rounded-full bg-white dark:bg-purple-300/30';
                bubble.style.cssText = `
                    left: ${left}%;
                    bottom: -${size}px;
                    width: ${size}px;
                    height: ${size}px;
                    opacity: ${opacity};
                    animation: float-up ${duration}s linear infinite;
                    animation-delay: ${delay}s;
                `;

                bubblesContainer.appendChild(bubble);
            }
        }

        // 显示提示消息
        function showToast(message, type = 'info') {
            let icon, bgColor;

            switch (type) {
                case 'success':
                    icon = 'fa-check-circle';
                    bgColor = 'bg-success text-white';
                    break;
                case 'error':
                    icon = 'fa-times-circle';
                    bgColor = 'bg-red-500 text-white';
                    break;
                case 'info':
                default:
                    icon = 'fa-info-circle';
                    bgColor = 'bg-blue-500 text-white';
                    break;
            }

            toastIcon.className = `fa ${icon}`;
            toastMessage.textContent = message;
            toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-lg z-50 transition-all duration-300 flex items-center ${bgColor}`;
            toast.style.opacity = '1';

            setTimeout(() => {
                toast.style.opacity = '0';
            }, 3000);
        }

        // 处理文件上传
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('border-purple-600', 'dark:border-purple-400', 'bg-purple-50/50', 'dark:bg-purple-900/20');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('border-purple-600', 'dark:border-purple-400', 'bg-purple-50/50', 'dark:bg-purple-900/20');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-purple-600', 'dark:border-purple-400', 'bg-purple-50/50', 'dark:bg-purple-900/20');

            if (e.dataTransfer.files.length) {
                const file = e.dataTransfer.files[0];
                handleFile(file);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                const file = fileInput.files[0];
                handleFile(file);
            }
        });

        async function handleFile(file) {
            if (file.type !== 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' &&
                !file.name.endsWith('.xlsx')) {
                showToast('请上传.xlsx格式的Excel文件', 'error');
                return;
            }

            fileName.textContent = file.name;
            fileInfo.classList.remove('hidden');

            try {
                await ensureXlsxLoaded();
            } catch (err) {
                console.error(err);
                showToast('Excel解析组件加载失败，请刷新页面重试', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    // 清空之前的选项
                    columnSelect.innerHTML = '';

                    // 添加列选项
                    if (jsonData.length > 0) {
                        const headerRow = jsonData[0];
                        headerRow.forEach((header, index) => {
                            const option = document.createElement('option');
                            option.value = index;
                            option.textContent = header || `第${index + 1}列`;
                            columnSelect.appendChild(option);
                        });

                        columnSelection.classList.remove('hidden');
                        classSelect.value = '';
                        showToast('文件解析成功，请选择姓名列', 'success');
                    } else {
                        showToast('Excel文件中没有数据', 'error');
                    }
                } catch (error) {
                    console.error('解析文件出错:', error);
                    showToast('文件解析失败，请检查文件格式', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // 移除已上传文件
        removeFile.addEventListener('click', () => {
            fileInput.value = '';
            fileInfo.classList.add('hidden');
            columnSelection.classList.add('hidden');
            studentsPreview.classList.add('hidden');
            students = [];
            availableStudents = [];
            classSelect.value = '';
            startBtn.disabled = true;
            displayText.textContent = '请先导入学生名单';
            showToast('已移除文件', 'info');
        });

        // 选择班级：导入内置默认名单
        classSelect.addEventListener('change', () => {
            const key = classSelect.value;
            if (!key) return;
            const roster = defaultClassRosters[key];
            if (!roster || roster.length === 0) {
                showToast('该班级暂无默认名单', 'error');
                return;
            }
            clearExcelImportUI();
            if (applyStudentNames(roster)) {
                showToast(`已导入「${key}」默认名单（${students.length}人）`, 'success');
            }
        });

        // 确认列选择并导入学生
        confirmColumn.addEventListener('click', async () => {
            const columnIndex = parseInt(columnSelect.value);

            // 重新读取文件以获取学生数据
            if (fileInput.files.length) {
                try {
                    await ensureXlsxLoaded();
                } catch (err) {
                    console.error(err);
                    showToast('Excel解析组件加载失败，请刷新页面重试', 'error');
                    return;
                }
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function (e) {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                        const names = [];
                        for (let i = 1; i < jsonData.length; i++) {
                            names.push(jsonData[i][columnIndex]);
                        }
                        classSelect.value = '';
                        if (applyStudentNames(names)) {
                            showToast(`成功导入 ${students.length} 名学生`, 'success');
                        }
                    } catch (error) {
                        console.error('导入学生出错:', error);
                        showToast('导入学生失败', 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
            }
        });

        function removeStudentAt(index) {
            if (isRolling) {
                showToast('点名进行中，请先停止后再删减名单', 'info');
                return;
            }
            if (index < 0 || index >= students.length) return;
            const removed = students[index];
            students.splice(index, 1);
            const ai = availableStudents.indexOf(removed);
            if (ai !== -1) availableStudents.splice(ai, 1);

            if (students.length === 0) {
                studentsPreview.classList.add('hidden');
                startBtn.disabled = true;
                displayText.textContent = '请先导入学生名单';
                showToast('名单已清空', 'info');
                return;
            }
            displayStudentPreview();
        }

        // 显示学生预览（支持点击 × 删减）
        function displayStudentPreview() {
            studentsList.innerHTML = '';
            students.forEach((name, index) => {
                const tag = document.createElement('span');
                tag.className =
                    'inline-flex items-center gap-0.5 pl-2.5 pr-1 py-1 rounded-full text-sm bg-purple-100 dark:bg-purple-900/50 text-purple-800 dark:text-purple-200 border border-purple-200/80 dark:border-purple-700/80';

                const label = document.createElement('span');
                label.textContent = name;

                const rm = document.createElement('button');
                rm.type = 'button';
                rm.className =
                    'flex h-6 w-6 shrink-0 items-center justify-center rounded-full text-purple-600 hover:bg-purple-300/60 dark:text-purple-300 dark:hover:bg-purple-900/80 transition-colors disabled:opacity-35 disabled:cursor-not-allowed';
                rm.title = '从名单中移除';
                rm.setAttribute('aria-label', `将「${name}」从名单中移除`);
                rm.disabled = isRolling;
                rm.innerHTML = '<i class="fa fa-times text-xs leading-none"></i>';
                rm.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    removeStudentAt(index);
                });

                tag.appendChild(label);
                tag.appendChild(rm);
                studentsList.appendChild(tag);
            });

            studentsCount.textContent = `(${students.length}名学生)`;
            studentsPreview.classList.remove('hidden');
        }

        // 开始点名
        startBtn.addEventListener('click', () => {
            if (availableStudents.length === 0) {
                // 所有学生都已被点过一轮，重置可用名单
                availableStudents = [...students];
                showToast('所有学生已点过一轮，已重置名单', 'info');
            }

            isRolling = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            feedbackButtons.classList.add('hidden');
            displayStudentPreview();

            // 开始快速切换名字
            let lastIndex = -1;
            rollInterval = setInterval(() => {
                // 确保不连续显示同一个名字
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * availableStudents.length);
                } while (randomIndex === lastIndex && availableStudents.length > 1);

                lastIndex = randomIndex;
                currentName = availableStudents[randomIndex];
                displayText.textContent = currentName;

                // 添加翻转效果
                displayText.style.transition = 'transform 0.1s';
                displayText.style.transform = 'scale(1.1) rotate(2deg)';
                setTimeout(() => {
                    displayText.style.transform = 'scale(1) rotate(0)';
                }, 50);
            }, 80);
        });

        // 停止点名
        stopBtn.addEventListener('click', () => {
            if (!isRolling) return;

            clearInterval(rollInterval);
            isRolling = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            feedbackButtons.classList.remove('hidden');
            displayStudentPreview();

            // 添加选中效果
            displayText.style.transition = 'all 0.5s';
            displayText.style.transform = 'scale(1.2)';

            // 闪光效果
            shineEffect.style.opacity = '1';
            shineEffect.style.transform = 'rotate(45deg) translate-x(200%)';

            setTimeout(() => {
                displayText.style.transform = 'scale(1)';
                shineEffect.style.opacity = '0';
                shineEffect.style.transform = 'rotate(45deg) translate-x(-100%)';
            }, 500);

            // 从可用名单中移除当前选中的学生
            availableStudents = availableStudents.filter(name => name !== currentName);
        });

        // 处理回答正确
        correctBtn.addEventListener('click', () => {
            const phrases = getPraisePhrases();
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];

            // 记录结果
            addHistoryRecord(currentName, 'correct', randomPhrase);

            // 显示弹窗
            showResultModal('太棒了！', currentName, randomPhrase, 'success');

            // 播放庆祝动画
            createConfetti(100);
            createFireworks(5);

            feedbackButtons.classList.add('hidden');
        });

        // 处理需要努力
        effortBtn.addEventListener('click', () => {
            const phrases = getEncouragePhrases();
            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];

            // 记录结果
            addHistoryRecord(currentName, 'effort', randomPhrase);

            // 显示弹窗
            showResultModal('继续加油！', currentName, randomPhrase, 'effort');

            // 播放鼓励动画
            createHearts(15);

            feedbackButtons.classList.add('hidden');
        });

        // 添加历史记录
        function addHistoryRecord(name, type, message) {
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const record = {
                name,
                type,
                message,
                time: timeStr,
                timestamp: now.getTime()
            };

            historyRecords.unshift(record); // 添加到开头
            updateHistoryDisplay();
        }

        // 更新历史记录显示
        function updateHistoryDisplay() {
            if (historyRecords.length === 0) {
                historyList.innerHTML = `
                    <div class="text-center text-purple-500 dark:text-purple-400 py-8">
                        <i class="fa fa-star-o text-4xl mb-2 block animate-float"></i>
                        还没有点名记录哦
                    </div>
                `;
                return;
            }

            historyList.innerHTML = '';

            historyRecords.forEach((record, index) => {
                const typeClass = record.type === 'correct'
                    ? 'bg-success/20 text-success border-success/30'
                    : 'bg-effort/20 text-effort border-effort/30';

                const typeText = record.type === 'correct' ? '回答正确' : '继续努力';
                const typeIcon = record.type === 'correct' ? 'fa-check-circle' : 'fa-heart';

                const recordEl = document.createElement('div');
                recordEl.className = `p-3 rounded-lg border ${typeClass} transition-all duration-300 animate-fade-in ${index === 0 ? 'ring-2 ring-offset-2' : ''}`;
                recordEl.style.animationDelay = `${index * 0.1}s`;

                recordEl.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-bold text-purple-800 dark:text-purple-200">${record.name}</div>
                            <div class="text-sm mt-1">${record.message}</div>
                        </div>
                        <div class="text-right">
                            <div class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${typeClass}">
                                <i class="fa ${typeIcon} mr-1"></i> ${typeText}
                            </div>
                            <div class="text-xs text-purple-500 dark:text-purple-400 mt-1">${record.time}</div>
                        </div>
                    </div>
                `;

                historyList.appendChild(recordEl);
            });
        }

        // 显示结果弹窗
        function showResultModal(title, name, message, type) {
            modalTitle.textContent = title;
            modalMessage.innerHTML = `<strong>${name}</strong>，${message}`;

            if (type === 'success') {
                modalIcon.className = 'fa fa-trophy text-success animate-spin-slow';
            } else {
                modalIcon.className = 'fa fa-heart text-effort animate-pulse';
            }

            // 显示弹窗
            resultModal.classList.remove('pointer-events-none');
            resultModal.style.opacity = '1';
            setTimeout(() => {
                modalContent.style.transform = 'scale(1)';
            }, 10);
        }

        // 关闭结果弹窗
        closeModal.addEventListener('click', () => {
            modalContent.style.transform = 'scale(0.9)';
            setTimeout(() => {
                resultModal.style.opacity = '0';
                resultModal.classList.add('pointer-events-none');
            }, 300);
        });

        // 打开设置弹窗
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('pointer-events-none');
            settingsModal.style.opacity = '1';
            setTimeout(() => {
                settingsContent.style.transform = 'scale(1)';
            }, 10);
        });

        // 关闭设置弹窗
        closeSettings.addEventListener('click', () => {
            settingsContent.style.transform = 'scale(0.9)';
            setTimeout(() => {
                settingsModal.style.opacity = '0';
                settingsModal.classList.add('pointer-events-none');
            }, 300);
        });

        // 保存设置
        saveSettings.addEventListener('click', () => {
            const praiseText = praisePhrases.value.trim();
            const encourageText = encouragePhrases.value.trim();

            // 保存到本地存储
            if (praiseText) {
                localStorage.setItem('praisePhrases', praiseText);
            } else {
                localStorage.removeItem('praisePhrases');
            }

            if (encourageText) {
                localStorage.setItem('encouragePhrases', encourageText);
            } else {
                localStorage.removeItem('encouragePhrases');
            }

            showToast('设置已保存', 'success');

            // 关闭弹窗
            closeSettings.click();
        });

        // 加载设置
        function loadSettings() {
            const savedPraise = localStorage.getItem('praisePhrases');
            const savedEncourage = localStorage.getItem('encouragePhrases');

            praisePhrases.value = savedPraise || defaultPraisePhrases.join('\n');
            encouragePhrases.value = savedEncourage || defaultEncouragePhrases.join('\n');
        }

        // 获取表扬语
        function getPraisePhrases() {
            const saved = localStorage.getItem('praisePhrases');
            return saved ? saved.split('\n').filter(p => p.trim()) : defaultPraisePhrases;
        }

        // 获取鼓励语
        function getEncouragePhrases() {
            const saved = localStorage.getItem('encouragePhrases');
            return saved ? saved.split('\n').filter(p => p.trim()) : defaultEncouragePhrases;
        }

        // 切换主题模式
        themeToggle.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
        });

        // 创建庆祝动画 - 五彩纸屑
        function createConfetti(count) {
            animationContainer.innerHTML = ''; // 清空之前的动画

            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                const size = Math.random() * 10 + 5;
                const colors = ['#ff0000', '#ffa500', '#ffff00', '#008000', '#0000ff', '#4b0082', '#ee82ee'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const rotation = Math.random() * 360;
                const duration = Math.random() * 5 + 3;
                const delay = Math.random() * 2;

                confetti.className = 'absolute';
                confetti.style.cssText = `
                    left: ${left}%;
                    top: -10px;
                    width: ${size}px;
                    height: ${size}px;
                    background-color: ${color};
                    transform: rotate(${rotation}deg);
                    animation: confetti ${duration}s ease-in forwards;
                    animation-delay: ${delay}s;
                `;

                animationContainer.appendChild(confetti);
            }
        }

        // 创建庆祝动画 - 烟花
        function createFireworks(count) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const firework = document.createElement('div');
                    const size = Math.random() * 150 + 100;
                    const left = Math.random() * 100;
                    const top = Math.random() * 50 + 10;
                    const colors = ['#ff0000', '#ffa500', '#ffff00', '#008000', '#0000ff', '#4b0082', '#ee82ee'];
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    firework.className = 'absolute rounded-full';
                    firework.style.cssText = `
                        left: calc(${left}% - ${size / 2}px);
                        top: calc(${top}% - ${size / 2}px);
                        width: ${size}px;
                        height: ${size}px;
                        background-color: ${color};
                        opacity: 0;
                        box-shadow: 0 0 ${size * 0.5}px ${size * 0.2}px ${color};
                        animation: pop 1s ease-out forwards;
                    `;

                    animationContainer.appendChild(firework);

                    // 自动移除
                    setTimeout(() => {
                        if (firework.parentNode === animationContainer) {
                            animationContainer.removeChild(firework);
                        }
                    }, 1000);
                }, i * 500);
            }
        }

        // 创建鼓励动画 - 爱心
        function createHearts(count) {
            animationContainer.innerHTML = ''; // 清空之前的动画

            for (let i = 0; i < count; i++) {
                const heart = document.createElement('div');
                const size = Math.random() * 30 + 20;
                const colors = ['#FF69B4', '#FFA500', '#FF6347', '#BA55D3', '#4169E1'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const left = Math.random() * 100;
                const duration = Math.random() * 6 + 4;
                const delay = Math.random() * 2;
                const rotation = (Math.random() - 0.5) * 40;

                heart.className = 'absolute';
                heart.innerHTML = '❤';
                heart.style.cssText = `
                    left: ${left}%;
                    bottom: -30px;
                    font-size: ${size}px;
                    color: ${color};
                    transform: rotate(${rotation}deg);
                    animation: float-up ${duration}s ease-in forwards;
                    animation-delay: ${delay}s;
                    opacity: 0.8;
                `;

                animationContainer.appendChild(heart);
            }
        }

        // 初始化页面
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
